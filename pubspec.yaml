name: dak
description: "Pigeon - A modern social media platform."
publish_to: 'none'

version: 4.1.0+41

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  supabase_flutter: ^2.15.4
  provider: ^6.1.2
  google_fonts: ^6.1.0
  cached_network_image: ^3.4.1
  image_picker: ^1.0.7
  intl: ^0.20.2
  shared_preferences: ^2.5.5
  flutter_local_notifications: ^22.0.1
  audioplayers: ^6.7.1
  get_it: ^9.2.1
  cryptography: ^2.9.0
  flutter_secure_storage: ^10.3.1
  path_provider: ^2.1.3
  visibility_detector: ^0.4.0+2
  record: ^7.1.1
  qr_flutter: ^4.1.0
  image_cropper: ^12.2.1
  flutter_image_compress: ^2.4.0
  sqflite: ^2.4.3
  path: ^1.9.1
  crypto: ^3.0.7
  http: ^1.6.0
  firebase_crashlytics: ^4.3.10
  firebase_analytics: ^11.6.0
  go_router: ^14.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.8

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/launcher_icon_solid.png"
  adaptive_icon_background: "assets/launcher_background.png"
  adaptive_icon_foreground: "assets/launcher_foreground.png"

flutter:
  uses-material-design: true
  assets:
    - assets/logo_transparent.png
    - assets/onboarding_illus_4.png
    - assets/dak_icon.png
    - assets/google_logo.png
    - assets/sounds/pop.mp3
    - assets/sounds/chime.wav
    - assets/sounds/send.wav
    - assets/sounds/ping.mp3
    - assets/launcher_background.png
    - assets/launcher_foreground.png
    - assets/launcher_icon_solid.png

